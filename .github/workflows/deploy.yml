name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build WebAssembly
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Prepare Deployment Directory
        run: |
          cp target/wasm32-unknown-unknown/release/invaders_rust.wasm staging/game.wasm
          cp -r assets staging/assets
          BUILD_ID="${{ github.run_id }}"
          sed -i "s|load(\"game.wasm\")|load(\"game.wasm?v=${BUILD_ID}\")|g" staging/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staging

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
